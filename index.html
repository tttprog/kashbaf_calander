    async function downloadImage() {
      await document.fonts.ready;
      await Promise.all(
        Array.from(document.images).map(img => {
          if (img.complete) return Promise.resolve();
          return new Promise(resolve => {
            img.onload = img.onerror = resolve;
          });
        })
      );


      const element = document.getElementById("canvas");

      const canvas = await html2canvas(element, {
        scale: 3,
        useCORS: true,
        backgroundColor: "#ffffff",
        // width: 1080,
        // height: 1350,
        windowWidth: 1080,
        windowHeight: 1350,
      });

      const link = document.createElement("a");
      link.download = "calendar-post.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    async function loadCalendar() {
      const dlbtn = document.getElementById("dlbtn")
      dlbtn.disabled = true;
      dlbtn.textContent = "درحال دریافت اطلاعات"
      const url =
        "https://api.aladhan.com/v1/timingsByCity?city=Tehran&country=Iran&method=7";

      const response = await fetch(url);
      const json = await response.json();

      const data = json.data;

      // events
      const today_g = new Date();

      const formatted = today_g.toISOString().split("T")[0];
      const todayEvent = data_365.find(
        item => item.gregorian_date === formatted
      );
      const eventsEl = document.getElementById("events");
      // const is_holiday = document.getElementById("is_holiday");
      if (todayEvent?.events && todayEvent.events.length > 0) {
        eventsEl.textContent = todayEvent.events.join("، ");
      } else {
        eventsEl.textContent = "رویدادی برای این روز ثبت نشده است.";
      }
      // if (todayEvent?.is_holiday) {
      //   is_holiday.textContent = "تعطیل رسمی";
      // } else {
      //   is_holiday.textContent = "امروز تعطیل نیست.";
      // }
      // اوقات شرعی
      document.getElementById("fajr").textContent =
        data.timings.Fajr.substring(0, 5);

      document.getElementById("dhuhr").textContent =
        data.timings.Dhuhr.substring(0, 5);

      document.getElementById("maghrib").textContent =
        data.timings.Maghrib.substring(0, 5);

      // تاریخ میلادی
      document.getElementById("gregorian").innerHTML =
        `<span>${data.date.gregorian.day}</span>  <span>${data.date.gregorian.month.en}</span>  <span>${data.date.gregorian.year}</span>`;

      // تاریخ هجری
      document.getElementById("hijri").innerHTML =
        `<span>${data.date.hijri.day}</span> <span>${data.date.hijri.month.ar}</span> <span>${data.date.hijri.year}</span>`;

      // تاریخ شمسی (جلالی)
      const today = new Date();

      const weekday = new Intl.DateTimeFormat("fa-IR-u-ca-persian", {
        weekday: "long",
      }).format(today);

      const day = new Intl.DateTimeFormat("fa-IR-u-ca-persian", {
        day: "numeric",
      }).format(today);

      const month = new Intl.DateTimeFormat("fa-IR-u-ca-persian", {
        month: "long",
      }).format(today);

      const year = new Intl.DateTimeFormat("fa-IR-u-ca-persian", {
        year: "numeric",
      }).format(today);

      const persianDate = `<span>${weekday}</span> <span> ${day} ${month}</span> <span>${year}</span>`;

      document.getElementById("shamsi").innerHTML = persianDate;
      dlbtn.disabled = false;
      dlbtn.textContent = "دانلود"
    }



    loadCalendar();
  </script>

</body>

</html>
